name: Sync web3icons

on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-sync all SVGs (ignore cache)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout crypto-icons (develop)
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run sync
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            bun run sync:force
          else
            bun run sync
          fi

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/ maps/ colors/
          if git diff --cached --quiet; then
            echo "Nothing changed, skip commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "chore(sync): update web3icons ${DATE} (+${COUNT} files)"
            git push origin develop
          fi
