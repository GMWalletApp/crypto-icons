<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crypto-icons</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111;
  --panel: #181818;
  --line: #252525;
  --text: #e2e2e2;
  --muted: #555;
  --accent: #6366f1;
  --radius: 8px;
  --sz: 48px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: ui-sans-serif, system-ui, sans-serif;
  font-size: 14px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── top bar ── */
nav {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.wordmark { font-weight: 600; font-size: 15px; letter-spacing: -.2px; white-space: nowrap; }
.wordmark em { color: var(--accent); font-style: normal; }

.search {
  flex: 1;
  max-width: 360px;
  position: relative;
}
.search input {
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  color: var(--text);
  padding: 7px 10px 7px 32px;
  font-size: 13px;
  outline: none;
}
.search input:focus { border-color: var(--accent); }
.search input::placeholder { color: var(--muted); }
.search svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

.nav-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }

.tabs {
  display: flex;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}
.tabs button {
  background: none;
  border: none;
  color: var(--muted);
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  border-right: 1px solid var(--line);
  transition: color .1s, background .1s;
}
.tabs button:last-child { border-right: none; }
.tabs button.on { background: var(--accent); color: #fff; }
.tabs button:not(.on):hover { color: var(--text); }

.size-row {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
}
.size-row input[type=range] { width: 72px; accent-color: var(--accent); }

.count { color: var(--muted); font-size: 12px; white-space: nowrap; }

/* ── body ── */
.body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── sidebar ── */
aside {
  width: 156px;
  flex-shrink: 0;
  border-right: 1px solid var(--line);
  padding: 8px 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.cat {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--muted);
  width: 100%;
  text-align: left;
  font-size: 13px;
  transition: color .1s, background .1s;
}
.cat:hover { color: var(--text); background: var(--panel); }
.cat.on { color: var(--text); background: var(--panel); font-weight: 500; }
.cat .n { font-size: 11px; }

/* ── grid ── */
main {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(calc(var(--sz) + 56px), 1fr));
  gap: 6px;
}

.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 8px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  transition: border-color .12s;
}
.card:hover { border-color: var(--accent); }

.card img {
  width: var(--sz);
  height: var(--sz);
  object-fit: contain;
  display: block;
}
.card img.err { opacity: .15; }

.card .sym {
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card .label {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
}

.empty {
  grid-column: 1/-1;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--muted);
}

/* ── modal ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(3px);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.overlay.hide { display: none; }

.modal {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  width: 100%;
  max-width: 520px;
  max-height: 85vh;
  overflow-y: auto;
}

.mhead {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--line);
}
.mhead h2 { font-size: 16px; font-weight: 600; }
.mclose {
  background: none;
  border: 1px solid var(--line);
  color: var(--muted);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.mclose:hover { color: var(--text); }

.mbody { padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }

.sec-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }

.vgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.vcard {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.vcard img { width: 56px; height: 56px; object-fit: contain; }
.vcard .vl { font-size: 11px; color: var(--muted); }
.vcard.na { opacity: .25; }
.vcard .vph { width: 56px; height: 56px; background: var(--line); border-radius: 6px; }

.mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.mfield { background: var(--bg); border-radius: 6px; padding: 9px 11px; }
.mfield .fk { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
.mfield .fv { font-size: 13px; word-break: break-all; }

.urlrow {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border-radius: 6px;
  padding: 9px 11px;
}
.urlrow code { flex: 1; font-size: 11px; color: var(--muted); word-break: break-all; font-family: ui-monospace, monospace; }
.cpbtn {
  flex-shrink: 0;
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 4px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}
.cpbtn:hover { opacity: .85; }
</style>
</head>
<body>

<nav>
  <div class="wordmark">crypto<em>-icons</em></div>
  <div class="search">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="q" placeholder="Search…" autocomplete="off" spellcheck="false">
  </div>
  <div class="nav-right">
    <div class="tabs" id="vtabs">
      <button class="on" data-v="branded">Branded</button>
      <button data-v="mono">Mono</button>
      <button data-v="background">BG</button>
    </div>
    <div class="size-row">
      <svg width="11" height="11" viewBox="0 0 10 10" fill="currentColor"><rect width="10" height="10" rx="2"/></svg>
      <input id="sz" type="range" min="28" max="96" value="48">
      <svg width="16" height="16" viewBox="0 0 10 10" fill="currentColor"><rect width="10" height="10" rx="2"/></svg>
    </div>
    <span class="count" id="cnt"></span>
  </div>
</nav>

<div class="body">
  <aside>
    <button class="cat on" data-cat="all">All <span class="n" id="n-all"></span></button>
    <button class="cat" data-cat="tokens">Tokens <span class="n" id="n-tokens"></span></button>
    <button class="cat" data-cat="networks">Networks <span class="n" id="n-networks"></span></button>
    <button class="cat" data-cat="exchanges">Exchanges <span class="n" id="n-exchanges"></span></button>
    <button class="cat" data-cat="wallets">Wallets <span class="n" id="n-wallets"></span></button>
  </aside>
  <main><div id="grid"></div></main>
</div>

<div class="overlay hide" id="ov">
  <div class="modal">
    <div class="mhead">
      <h2 id="mtitle"></h2>
      <button class="mclose" id="mclose">✕</button>
    </div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

<script>
const CDN = 'https://cdn.jsdmirror.com/gh/GMWalletApp/crypto-icons@main';
const CATS = ['tokens','networks','exchanges','wallets'];

let all = [];
let visible = [];
let variant = 'branded';
let cat = 'all';

function url(category, v, name) {
  return `${CDN}/assets/${category}/${v}/${name}.svg`;
}

function fname(filePath) {
  return filePath.split(':').pop().toLowerCase();
}

async function init() {
  const maps = await Promise.all(
    CATS.map(c => fetch(`${CDN}/maps/${c}.json`).then(r => r.json()).catch(() => []))
  );
  CATS.forEach((c, i) => {
    maps[i].forEach(item => all.push({ ...item, _cat: c, _file: fname(item.filePath) }));
    document.getElementById('n-' + c).textContent = maps[i].length;
  });
  document.getElementById('n-all').textContent = all.length;
  filter();
}

function filter() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  visible = all.filter(item => {
    if (cat !== 'all' && item._cat !== cat) return false;
    if (q) {
      const h = (item.symbol || '') + ' ' + (item.name || '') + ' ' + (item.id || '');
      if (!h.toLowerCase().includes(q)) return false;
    }
    return true;
  });
  document.getElementById('cnt').textContent = visible.length.toLocaleString();
  render();
}

function render() {
  const grid = document.getElementById('grid');
  if (!visible.length) {
    grid.innerHTML = '<div class="empty">No results</div>';
    return;
  }

  // Build all cards at once — images lazy-load
  const frag = document.createDocumentFragment();
  visible.forEach((item, i) => {
    const v = item.variants.includes(variant) ? variant : item.variants[0];
    const u = url(item._cat, v, item._file);
    const sym = (item.symbol || item.id || '').toUpperCase();
    const name = item.name || item.id;

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${u}" alt="${sym}" loading="lazy" onerror="this.classList.add('err')">
      <div class="sym">${sym}</div>
      <div class="label">${name}</div>`;
    card.onclick = () => openModal(i);
    frag.appendChild(card);
  });

  grid.innerHTML = '';
  grid.appendChild(frag);
}

function openModal(i) {
  const item = visible[i];
  document.getElementById('mtitle').textContent = item.name || item.id;

  const variants = ['branded','mono','background'];
  const vcards = variants.map(v => {
    const has = item.variants.includes(v);
    const u = url(item._cat, v, item._file);
    return `<div class="vcard ${has?'':'na'}">
      ${has ? `<img src="${u}" alt="${v}" loading="lazy">` : '<div class="vph"></div>'}
      <span class="vl">${v}</span>
    </div>`;
  }).join('');

  const fields = [
    ['Category', item._cat],
    ['ID', item.id],
    item.symbol ? ['Symbol', item.symbol.toUpperCase()] : null,
    item.chainId ? ['Chain ID', item.chainId] : null,
    item.caip2id ? ['CAIP-2', item.caip2id] : null,
    item.type ? ['Type', item.type] : null,
    item.marketCapRank ? ['Market Cap Rank', '#' + item.marketCapRank] : null,
  ].filter(Boolean).map(([k,v]) =>
    `<div class="mfield"><div class="fk">${k}</div><div class="fv">${v}</div></div>`
  ).join('');

  const cu = url(item._cat, variant, item._file);
  const urlRow = `<div class="urlrow"><code>${cu}</code><button class="cpbtn" onclick="cp('${cu}',this)">Copy</button></div>`;

  const addrs = item.addresses && Object.keys(item.addresses).length
    ? `<div><div class="sec-title">Contract addresses</div>
        ${Object.entries(item.addresses).map(([chain, addr]) =>
          `<div class="urlrow" style="margin-top:6px"><code><b style="color:var(--text)">${chain}</b>  ${addr}</code><button class="cpbtn" onclick="cp('${addr}',this)">Copy</button></div>`
        ).join('')}
      </div>` : '';

  document.getElementById('mbody').innerHTML = `
    <div><div class="sec-title">Variants</div><div class="vgrid">${vcards}</div></div>
    <div><div class="sec-title">Details</div><div class="mgrid">${fields}</div></div>
    <div><div class="sec-title">CDN URL (${variant})</div>${urlRow}</div>
    ${addrs}`;

  document.getElementById('ov').classList.remove('hide');
}

function cp(text, btn) {
  navigator.clipboard.writeText(text);
  btn.textContent = '✓';
  setTimeout(() => btn.textContent = 'Copy', 1200);
}

// events
document.getElementById('q').addEventListener('input', filter);
document.getElementById('sz').addEventListener('input', e => {
  document.documentElement.style.setProperty('--sz', e.target.value + 'px');
});

document.querySelectorAll('.cat').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.cat').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  cat = b.dataset.cat;
  filter();
}));

document.querySelectorAll('#vtabs button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('#vtabs button').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  variant = b.dataset.v;
  render();
}));

document.getElementById('mclose').onclick = () => document.getElementById('ov').classList.add('hide');
document.getElementById('ov').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.add('hide'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('ov').classList.add('hide'); });

init();
</script>
</body>
</html>
